<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowState | Aesthetic Study Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-hover: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.4);
            --youtube-red: #ff0000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        /* Backgrounds */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out, transform 10s ease;
            transform: scale(1.1);
        }

        .bg-image.active {
            opacity: 1;
            transform: scale(1);
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.4) 100%);
            z-index: -1;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float-up 15s infinite;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
        }

        /* Layout */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2.5rem;
            z-index: 10;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            opacity: 0.9;
        }

        .top-controls {
            display: flex;
            gap: 0.75rem;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-size: 1.1rem;
            position: relative;
        }

        .icon-btn:hover {
            background: var(--glass-hover);
            transform: translateY(-2px);
        }

        .icon-btn.active {
            background: var(--youtube-red);
            border-color: var(--youtube-red);
            box-shadow: 0 0 20px rgba(255,0,0,0.4);
        }

        .icon-btn.playing::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Timer Section */
        .timer-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 5;
        }

        .mode-tabs {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem;
            background: var(--glass-bg);
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            margin-bottom: 3rem;
        }

        .mode-tab {
            padding: 0.6rem 1.5rem;
            border-radius: 100px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .mode-tab.active {
            background: rgba(255,255,255,0.95);
            color: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .mode-tab:hover:not(.active) {
            color: white;
            background: rgba(255,255,255,0.05);
        }

        .timer-container {
            text-align: center;
            position: relative;
        }

        .timer-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 300;
            line-height: 1;
            letter-spacing: -0.05em;
            text-shadow: 0 4px 30px rgba(0,0,0,0.5);
            margin-bottom: 0.5rem;
            background: linear-gradient(to bottom, #ffffff 0%, rgba(255,255,255,0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .timer-display::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 3px;
            opacity: 0.8;
        }

        .timer-label {
            font-size: 1rem;
            color: var(--text-secondary);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-top: 1.5rem;
            font-weight: 500;
        }

        .progress-container {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #34d399);
            border-radius: 2px;
            transition: width 1s linear;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .main-controls {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-top: 3rem;
        }

        .control-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: var(--glass-hover);
            transform: scale(1.1);
        }

        .control-btn.primary {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.95);
            color: #000;
            border: none;
            font-size: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .control-btn.primary:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
        }

        /* Bottom Bar */
        .bottom-bar {
            padding: 2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .stats {
            display: flex;
            gap: 2rem;
        }

        .stat {
            text-align: left;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0.25rem;
        }

        .task-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            font-weight: 500;
        }

        .task-toggle:hover {
            background: var(--glass-hover);
            border-color: rgba(255,255,255,0.3);
        }

        /* YouTube Music Widget - Enhanced with Search */
        .music-widget {
            position: fixed;
            bottom: 100px;
            right: 2rem;
            width: 380px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            z-index: 50;
            transform: translateY(20px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }

        .music-widget.open {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .music-widget.minimized {
            width: auto;
            padding: 0.75rem 1rem;
            bottom: 2rem;
            right: 7rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
        }

        .music-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .music-title {
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .music-controls {
            display: flex;
            gap: 0.5rem;
        }

        .music-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--glass-bg);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .music-btn:hover {
            background: var(--glass-hover);
            transform: scale(1.1);
        }

        /* Search Section */
        .search-section {
            margin-bottom: 1rem;
        }

        .search-input-wrapper {
            position: relative;
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .search-input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }

        .search-input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-btn {
            padding: 0.75rem 1rem;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        /* Search Results */
        .search-results {
            max-height: 150px;
            overflow-y: auto;
            display: none;
            margin-bottom: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .search-results.active {
            display: block;
        }

        .result-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.85rem;
        }

        .result-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-thumbnail {
            width: 40px;
            height: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .result-info {
            flex: 1;
            min-width: 0;
        }

        .result-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-channel {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Quick Presets */
        .presets-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .playlist-selector {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            margin-bottom: 0.75rem;
            scrollbar-width: none;
        }

        .playlist-selector::-webkit-scrollbar {
            display: none;
        }

        .playlist-chip {
            padding: 0.5rem 1rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .playlist-chip:hover {
            background: var(--glass-hover);
            color: white;
        }

        .playlist-chip.active {
            background: var(--youtube-red);
            border-color: var(--youtube-red);
            color: white;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 180px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #youtubePlayer {
            width: 100%;
            height: 100%;
            border: none;
        }

        .volume-slider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .volume-slider input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .now-playing {
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        /* Side Panel */
        .side-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 380px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--glass-border);
            z-index: 100;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 2rem;
            overflow-y: auto;
        }

        .side-panel.open {
            right: 0;
        }

        .panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 99;
            backdrop-filter: blur(5px);
        }

        .panel-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        /* Scrollbar for search results */
        .search-results::-webkit-scrollbar {
            width: 6px;
        }

        .search-results::-webkit-scrollbar-track {
            background: transparent;
        }

        .search-results::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        /* Loading spinner */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .music-widget {
                width: calc(100% - 2rem);
                right: 1rem;
                left: 1rem;
                bottom: 80px;
            }
            
            .music-widget.minimized {
                right: 1rem;
                bottom: 1rem;
                left: auto;
            }
        }

        .breathing {
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.6; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
        }
    </style>
</head>
<body>

    <!-- Backgrounds -->
    <div class="bg-container" id="bgContainer">
        <div class="bg-image active" style="background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80')"></div>
        <div class="bg-image" style="background-image: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1920&q=80')"></div>
        <div class="bg-image" style="background-image: url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1920&q=80')"></div>
        <div class="bg-image" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1920&q=80')"></div>
    </div>
    <div class="bg-overlay"></div>
    <div class="particles" id="particles"></div>

    <!-- App -->
    <div class="app-container">
        <div class="top-bar">
            <div class="logo">FlowState</div>
            <div class="top-controls">
                <button class="icon-btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
                <button class="icon-btn" onclick="toggleMusicWidget()" id="musicBtn" title="Music (M)">🎵</button>
                <button class="icon-btn" onclick="toggleMute()" id="muteBtn">🔊</button>
                <button class="icon-btn" onclick="openSettings()">⚙</button>
            </div>
        </div>

        <div class="timer-section">
            <div class="mode-tabs">
                <button class="mode-tab active" onclick="setMode('focus')">Focus</button>
                <button class="mode-tab" onclick="setMode('shortBreak')">Short Break</button>
                <button class="mode-tab" onclick="setMode('longBreak')">Long Break</button>
            </div>

            <div class="timer-container">
                <div class="timer-display" id="timerDisplay">25:00</div>
                <div class="timer-label" id="timerLabel">Ready to focus</div>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar" style="width: 100%"></div>
                </div>
            </div>

            <div class="main-controls">
                <button class="control-btn" onclick="resetTimer()">↺</button>
                <button class="control-btn primary" onclick="toggleTimer()" id="playBtn">▶</button>
                <button class="control-btn" onclick="skipTimer()">⏭</button>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="sessionsCount">0</div>
                    <div class="stat-label">Sessions</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="minutesCount">0</div>
                    <div class="stat-label">Minutes</div>
                </div>
            </div>
            
            <button class="task-toggle" onclick="openTasks()">
                <span>Tasks</span>
                <span id="taskBadge" style="background: var(--accent); padding: 0.2rem 0.6rem; border-radius: 100px; font-size: 0.75rem;">0</span>
            </button>
        </div>
    </div>

    <!-- YouTube Music Widget with Search -->
    <div class="music-widget" id="musicWidget">
        <div class="music-header">
            <div class="music-title">
                <span style="color: var(--youtube-red);">●</span>
                <span id="currentTrack">Study Music</span>
            </div>
            <div class="music-controls">
                <button class="music-btn" onclick="togglePlay()" id="playMusicBtn">▶</button>
                <button class="music-btn" onclick="minimizeMusic()">−</button>
            </div>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-input-wrapper">
                <input type="text" class="search-input" id="searchInput" 
                       placeholder="Paste YouTube URL or Video ID..." 
                       onkeypress="handleSearchKeypress(event)">
                <button class="search-btn" onclick="searchAndPlay()" id="searchBtn">
                    <span id="searchIcon">▶</span>
                </button>
            </div>
            
            <!-- Search Results -->
            <div class="search-results" id="searchResults"></div>

            <div class="presets-label">Popular Study Music</div>
            <div class="playlist-selector">
                <div class="playlist-chip active" onclick="loadPlaylist('jfKfPfyJRdk', 'Lofi Girl', this)">Lofi Girl</div>
                <div class="playlist-chip" onclick="loadPlaylist('mPZkdNFkNps', 'Rain Sounds', this)">Rain</div>
                <div class="playlist-chip" onclick="loadPlaylist('nMfPWeZihzw', 'Nature Sounds', this)">Nature</div>
                <div class="playlist-chip" onclick="loadPlaylist('1fueZCTYkpA', 'Classical', this)">Classical</div>
                <div class="playlist-chip" onclick="loadPlaylist('rUxyKA7gr48', 'Jazz', this)">Jazz</div>
                <div class="playlist-chip" onclick="loadPlaylist('DWcJFNfaw9c', 'Coffe Shop', this)">Coffee Shop</div>
            </div>
        </div>
        
        <div class="video-container">
            <div id="youtubePlayer"></div>
        </div>

        <div class="volume-slider">
            <span style="font-size: 1.1rem;">🔊</span>
            <input type="range" min="0" max="100" value="50" id="volumeSlider" oninput="setVolume(this.value)">
            <span style="font-size: 0.8rem; min-width: 35px; text-align: right;" id="volumeValue">50%</span>
        </div>
    </div>

    <!-- Minimized Music -->
    <!-- Side Panel -->
    <div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
    <div class="side-panel" id="sidePanel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2 style="font-size: 1.5rem; font-weight: 600;" id="panelTitle">Tasks</h2>
            <button class="icon-btn" onclick="closePanel()" style="width: 36px; height: 36px;">✕</button>
        </div>

        <div id="tasksSection">
            <div style="position: relative; margin-bottom: 1.5rem;">
                <input type="text" style="width: 100%; padding: 1rem 3rem 1rem 1.25rem; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; color: white; font-size: 1rem; outline: none;" 
                       id="taskInput" placeholder="Add a new task..." maxlength="60">
                <button onclick="addTask()" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; border-radius: 8px; border: none; background: var(--accent); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">+</button>
            </div>
            <div id="taskList" style="display: flex; flex-direction: column; gap: 0.75rem;"></div>
        </div>
    </div>

    <script>
        // YouTube API
        let player;
        let isPlaying = false;
        let currentVolume = 50;

        // Preset study music database (for search simulation)
        const studyMusicDB = [
            { id: 'jfKfPfyJRdk', title: 'Lofi Girl - Study Beats', channel: 'Lofi Girl', emoji: '🎵' },
            { id: 'mPZkdNFkNps', title: 'Relaxing Rain Sounds', channel: 'Nature & Relaxation', emoji: '🌧️' },
            { id: 'nMfPWeZihzw', title: 'Forest Sounds - Birds', channel: 'Nature Sounds', emoji: '🌲' },
            { id: '1fueZCTYkpA', title: 'Classical Music for Studying', channel: 'Classical Mastery', emoji: '🎻' },
            { id: 'rUxyKA7gr48', title: 'Coffee Shop Ambience', channel: 'Ambient Worlds', emoji: '☕' },
            { id: 'DWcJFNfaw9c', title: 'Jazz Hop Cafe', channel: 'Chill Beats', emoji: '🎷' },
            { id: '5qap5aO4i9A', title: 'Chill Study Beats', channel: 'ChilledCow', emoji: '📚' },
            { id: 'lTRiuFIWV54', title: 'Ambient Study Music', channel: 'Relaxation Hub', emoji: '🧘' },
            { id: 'W9P5kdT2EcY', title: 'Deep Focus Music', channel: 'Greenred Productions', emoji: '🎯' },
            { id: 'sjkrrmBnpGE', title: 'Cinematic Ambient', channel: 'Ambient Music', emoji: '🎬' }
        ];

        // State
        const state = {
            mode: 'focus',
            timeLeft: 25 * 60,
            totalTime: 25 * 60,
            isRunning: false,
            timerId: null,
            tasks: [],
            activeTaskId: null,
            currentBg: 0,
            settings: {
                focus: 25,
                shortBreak: 5,
                longBreak: 15,
                autoBreak: false,
                notifications: false,
                sound: true
            },
            stats: {
                sessions: 0,
                minutes: 0
            }
        };

        // Load YouTube API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtubePlayer', {
                height: '100%',
                width: '100%',
                videoId: 'jfKfPfyJRdk',
                playerVars: {
                    'playsinline': 1,
                    'controls': 0,
                    'disablekb': 1,
                    'fs': 0,
                    'modestbranding': 1,
                    'rel': 0,
                    'autoplay': 0
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            player.setVolume(currentVolume);
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                isPlaying = true;
                updateMusicUI();
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                isPlaying = false;
                updateMusicUI();
            }
        }

        // Search Functions
        function handleSearchKeypress(e) {
            if (e.key === 'Enter') {
                searchAndPlay();
            }
        }

        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : url;
        }

        function searchAndPlay() {
            const input = document.getElementById('searchInput');
            const query = input.value.trim();
            
            if (!query) return;
            
            const videoId = extractVideoId(query);
            
            // If it looks like a direct ID (11 chars), play immediately
            if (videoId.length === 11 && !query.includes(' ')) {
                loadVideoById(videoId, 'Custom Track');
                input.value = '';
                hideSearchResults();
                return;
            }
            
            // Otherwise, show suggestions from preset DB
            showSearchResults(query);
        }

        function showSearchResults(query) {
            const resultsDiv = document.getElementById('searchResults');
            const lowerQuery = query.toLowerCase();
            
            // Filter preset database
            const matches = studyMusicDB.filter(item => 
                item.title.toLowerCase().includes(lowerQuery) || 
                item.channel.toLowerCase().includes(lowerQuery)
            );
            
            if (matches.length === 0) {
                resultsDiv.innerHTML = '<div class="result-item" style="opacity: 0.6; cursor: default;">No results found. Try direct YouTube URL</div>';
            } else {
                resultsDiv.innerHTML = matches.map(item => `
                    <div class="result-item" onclick="playFromSearch('${item.id}', '${item.title.replace(/'/g, "\\'")}')">
                        <div class="result-thumbnail">${item.emoji}</div>
                        <div class="result-info">
                            <div class="result-title">${item.title}</div>
                            <div class="result-channel">${item.channel}</div>
                        </div>
                    </div>
                `).join('');
            }
            
            resultsDiv.classList.add('active');
        }

        function playFromSearch(id, title) {
            loadVideoById(id, title);
            document.getElementById('searchInput').value = '';
            hideSearchResults();
            
            // Update active chip
            document.querySelectorAll('.playlist-chip').forEach(chip => chip.classList.remove('active'));
        }

        function hideSearchResults() {
            document.getElementById('searchResults').classList.remove('active');
        }

        function loadVideoById(id, title) {
            if (!player || !player.loadVideoById) return;
            
            player.loadVideoById(id);
            document.getElementById('currentTrack').textContent = title;
            document.getElementById('minimizedTrack').textContent = title;
            
            // Save to recent searches (optional enhancement)
            updateMusicUI();
        }

        function togglePlay() {
            if (!player || !player.playVideo) return;
            
            if (isPlaying) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        function loadPlaylist(videoId, name, element) {
            loadVideoById(videoId, name);
            
            document.querySelectorAll('.playlist-chip').forEach(chip => {
                chip.classList.remove('active');
            });
            if (element) element.classList.add('active');
            hideSearchResults();
        }

        function setVolume(value) {
            currentVolume = value;
            if (player && player.setVolume) {
                player.setVolume(value);
            }
            document.getElementById('volumeValue').textContent = value + '%';
        }

        function toggleMusicWidget() {
            const widget = document.getElementById('musicWidget');
            const minimized = document.getElementById('musicMinimized');
            
            if (widget.classList.contains('open')) {
                minimizeMusic();
            } else {
                maximizeMusic();
            }
        }

        function maximizeMusic() {
            document.getElementById('musicWidget').classList.add('open');
            document.getElementById('musicMinimized').style.opacity = '0';
            document.getElementById('musicMinimized').style.pointerEvents = 'none';
        }

        function minimizeMusic() {
            document.getElementById('musicWidget').classList.remove('open');
            document.getElementById('musicMinimized').style.opacity = '1';
            document.getElementById('musicMinimized').style.pointerEvents = 'all';
        }

        function updateMusicUI() {
            const btn = document.getElementById('playMusicBtn');
            const musicBtn = document.getElementById('musicBtn');
            
            btn.textContent = isPlaying ? '⏸' : '▶';
            
            if (isPlaying) {
                musicBtn.classList.add('active', 'playing');
            } else {
                musicBtn.classList.remove('active', 'playing');
            }
        }

        // Timer Functions
        function toggleTimer() {
            if (state.isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            if (state.timeLeft <= 0) return;
            
            state.isRunning = true;
            document.getElementById('playBtn').innerHTML = '⏸';
            document.getElementById('timerLabel').textContent = state.mode === 'focus' ? 'Focusing' : 'Resting';
            document.querySelector('.timer-display').classList.remove('breathing');
            
            state.timerId = setInterval(() => {
                state.timeLeft--;
                updateDisplay();
                
                if (state.timeLeft <= 0) {
                    completeTimer();
                }
            }, 1000);
            
            playSound('start');
        }

        function pauseTimer() {
            state.isRunning = false;
            clearInterval(state.timerId);
            document.getElementById('playBtn').innerHTML = '▶';
            document.getElementById('timerLabel').textContent = 'Paused';
            document.querySelector('.timer-display').classList.add('breathing');
            playSound('pause');
        }

        function resetTimer() {
            pauseTimer();
            state.timeLeft = state.settings[state.mode] * 60;
            state.totalTime = state.timeLeft;
            updateDisplay();
            document.getElementById('timerLabel').textContent = 'Ready';
            document.querySelector('.timer-display').classList.remove('breathing');
        }

        function skipTimer() {
            pauseTimer();
            state.timeLeft = 0;
            updateDisplay();
            setTimeout(() => completeTimer(), 100);
        }

        function completeTimer() {
            clearInterval(state.timerId);
            state.isRunning = false;
            document.getElementById('playBtn').innerHTML = '▶';
            
            if (state.mode === 'focus') {
                state.stats.sessions++;
                state.stats.minutes += state.settings.focus;
                updateStats();
                playSound('complete');
                completeTask();
                
                if (state.settings.autoBreak) {
                    setTimeout(() => {
                        setMode('shortBreak');
                        startTimer();
                    }, 2000);
                }
            } else {
                playSound('complete');
                setTimeout(() => setMode('focus'), 2000);
            }
            
            saveData();
            resetTimer();
        }

        function setMode(mode) {
            state.mode = mode;
            state.timeLeft = state.settings[mode] * 60;
            state.totalTime = state.timeLeft;
            
            document.querySelectorAll('.mode-tab').forEach((tab, idx) => {
                const modes = ['focus', 'shortBreak', 'longBreak'];
                tab.classList.toggle('active', modes[idx] === mode);
            });
            
            resetTimer();
            
            const labels = {
                focus: 'Ready to focus',
                shortBreak: 'Take a short break',
                longBreak: 'Take a long break'
            };
            document.getElementById('timerLabel').textContent = labels[mode];
        }

        function updateDisplay() {
            const mins = Math.floor(state.timeLeft / 60);
            const secs = state.timeLeft % 60;
            const display = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            document.getElementById('timerDisplay').textContent = display;
            document.title = display + ' - FlowState';
            
            const progress = (state.timeLeft / state.totalTime) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        // Tasks
        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) return;
            
            const task = {
                id: Date.now(),
                text,
                completed: false
            };
            
            state.tasks.unshift(task);
            if (!state.activeTaskId) state.activeTaskId = task.id;
            
            input.value = '';
            renderTasks();
            saveData();
        }

        function toggleTask(id, e) {
            e.stopPropagation();
            const task = state.tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                renderTasks();
                saveData();
            }
        }

        function selectTask(id) {
            state.activeTaskId = id;
            renderTasks();
        }

        function deleteTask(id, e) {
            e.stopPropagation();
            state.tasks = state.tasks.filter(t => t.id !== id);
            if (state.activeTaskId === id) state.activeTaskId = null;
            renderTasks();
            saveData();
        }

        function completeTask() {
            if (state.activeTaskId) {
                const task = state.tasks.find(t => t.id === state.activeTaskId);
                if (task && !task.completed) {
                    task.completed = true;
                    renderTasks();
                }
            }
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            const badge = document.getElementById('taskBadge');
            
            const active = state.tasks.filter(t => !t.completed).length;
            badge.textContent = active;
            
            list.innerHTML = state.tasks.map(task => `
                <div style="display: flex; align-items: center; gap: 1rem; padding: 1rem; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; cursor: pointer; transition: all 0.3s; ${task.id === state.activeTaskId ? 'border-color: var(--accent); background: rgba(16, 185, 129, 0.1);' : ''} ${task.completed ? 'opacity: 0.5;' : ''}" 
                     onclick="selectTask(${task.id})">
                    <div style="width: 20px; height: 20px; border: 2px solid ${task.completed ? 'var(--accent)' : 'var(--text-secondary)'}; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: ${task.completed ? 'var(--accent)' : 'transparent'}; color: white; font-size: 0.8rem;" 
                         onclick="toggleTask(${task.id}, event)">${task.completed ? '✓' : ''}</div>
                    <span style="flex: 1; font-size: 0.95rem; ${task.completed ? 'text-decoration: line-through;' : ''}">${task.text}</span>
                    <span style="opacity: 0; color: #ff6b6b; cursor: pointer; padding: 0.25rem; transition: opacity 0.2s;" 
                          onclick="deleteTask(${task.id}, event)">×</span>
                </div>
            `).join('');
            
            list.querySelectorAll('div > div:last-child').forEach(el => {
                el.parentElement.addEventListener('mouseenter', () => el.style.opacity = '1');
                el.parentElement.addEventListener('mouseleave', () => el.style.opacity = '0');
            });
        }

        // UI Functions
        function openTasks() {
            document.getElementById('panelTitle').textContent = 'Tasks';
            document.getElementById('tasksSection').style.display = 'block';
            openPanel();
        }

        function openSettings() {
            document.getElementById('panelTitle').textContent = 'Settings';
            document.getElementById('tasksSection').innerHTML = `
                <div style="color: var(--text-secondary); line-height: 1.6;">
                    <p style="margin-bottom: 1rem;">Timer Settings:</p>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem;">
                        <div>
                            <label style="font-size: 0.8rem; color: var(--text-secondary);">Focus</label>
                            <input type="number" id="settingFocus" value="${state.settings.focus}" style="width: 100%; padding: 0.5rem; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 8px; color: white; margin-top: 0.5rem; text-align: center;">
                        </div>
                        <div>
                            <label style="font-size: 0.8rem; color: var(--text-secondary);">Short Break</label>
                            <input type="number" id="settingShort" value="${state.settings.shortBreak}" style="width: 100%; padding: 0.5rem; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 8px; color: white; margin-top: 0.5rem; text-align: center;">
                        </div>
                        <div>
                            <label style="font-size: 0.8rem; color: var(--text-secondary);">Long Break</label>
                            <input type="number" id="settingLong" value="${state.settings.longBreak}" style="width: 100%; padding: 0.5rem; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 8px; color: white; margin-top: 0.5rem; text-align: center;">
                        </div>
                    </div>
                    <button onclick="saveSettings()" style="width: 100%; padding: 1rem; background: var(--accent); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer;">Save Settings</button>
                </div>
            `;
            openPanel();
        }

        function saveSettings() {
            state.settings.focus = parseInt(document.getElementById('settingFocus').value) || 25;
            state.settings.shortBreak = parseInt(document.getElementById('settingShort').value) || 5;
            state.settings.longBreak = parseInt(document.getElementById('settingLong').value) || 15;
            saveData();
            closePanel();
            document.getElementById('tasksSection').innerHTML = `
                <div style="position: relative; margin-bottom: 1.5rem;">
                    <input type="text" style="width: 100%; padding: 1rem 3rem 1rem 1.25rem; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; color: white; font-size: 1rem; outline: none;" 
                           id="taskInput" placeholder="Add a new task..." maxlength="60">
                    <button onclick="addTask()" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; border-radius: 8px; border: none; background: var(--accent); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">+</button>
                </div>
                <div id="taskList" style="display: flex; flex-direction: column; gap: 0.75rem;"></div>
            `;
            document.getElementById('taskInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTask();
            });
            renderTasks();
        }

        function openPanel() {
            document.getElementById('sidePanel').classList.add('open');
            document.getElementById('panelOverlay').classList.add('open');
        }

        function closePanel() {
            document.getElementById('sidePanel').classList.remove('open');
            document.getElementById('panelOverlay').classList.remove('open');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function toggleMute() {
            state.settings.sound = !state.settings.sound;
            document.getElementById('muteBtn').textContent = state.settings.sound ? '🔊' : '🔇';
            if (player && player.mute) {
                if (!state.settings.sound) {
                    player.mute();
                } else {
                    player.unMute();
                }
            }
            saveData();
        }

        function playSound(type) {
            if (!state.settings.sound) return;
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            if (type === 'start') {
                oscillator.frequency.value = 440;
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            } else if (type === 'complete') {
                oscillator.frequency.value = 523.25;
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);
            }
        }

        function updateStats() {
            document.getElementById('sessionsCount').textContent = state.stats.sessions;
            document.getElementById('minutesCount').textContent = state.stats.minutes;
        }

        // Storage
        function saveData() {
            localStorage.setItem('flowstate_data', JSON.stringify({
                settings: state.settings,
                stats: state.stats,
                tasks: state.tasks,
                currentBg: state.currentBg
            }));
        }

        function loadData() {
            const saved = localStorage.getItem('flowstate_data');
            if (saved) {
                const data = JSON.parse(saved);
                Object.assign(state.settings, data.settings || {});
                Object.assign(state.stats, data.stats || {});
                state.tasks = data.tasks || [];
                if (data.currentBg !== undefined) state.currentBg = data.currentBg;
                document.getElementById('muteBtn').textContent = state.settings.sound ? '🔊' : '🔇';
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            createParticles();
            updateDisplay();
            renderTasks();
            updateStats();
            
            setInterval(() => {
                if (!state.isRunning) return;
                const bgs = document.querySelectorAll('.bg-image');
                bgs[state.currentBg].classList.remove('active');
                state.currentBg = (state.currentBg + 1) % bgs.length;
                bgs[state.currentBg].classList.add('active');
            }, 60000);
            
            document.getElementById('taskInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTask();
            });

            // Close search results when clicking outside
            document.addEventListener('click', (e) => {
                const searchSection = document.querySelector('.search-section');
                if (!searchSection.contains(e.target)) {
                    hideSearchResults();
                }
                
                const widget = document.getElementById('musicWidget');
                const btn = document.getElementById('musicBtn');
                const minimized = document.getElementById('musicMinimized');
                
                if (!widget.contains(e.target) && !btn.contains(e.target) && !minimized.contains(e.target)) {
                    if (widget.classList.contains('open')) {
                        minimizeMusic();
                    }
                }
            });
        });

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 15 + 's';
                p.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(p);
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            if (e.code === 'Space') {
                e.preventDefault();
                toggleTimer();
            } else if (e.code === 'KeyR') {
                resetTimer();
            } else if (e.code === 'KeyM') {
                toggleMusicWidget();
            } else if (e.code === 'KeyF') {
                toggleFullscreen();
            } else if (e.code === 'Escape') {
                closePanel();
                minimizeMusic();
                hideSearchResults();
            }
        });
    </script>
</body>
</html>
